<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <meta name="theme-color" content="#0a0a0b"/>
  <title>NYC Transit</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{height:100%;}
    body{background:#0a0a0b;color:#F2F1ED;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
    select{-webkit-appearance:none;appearance:none;}
    input::placeholder{color:#5a5a5f;}
    ::-webkit-scrollbar{width:0;}
    .spin{animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .pulse{animation:pulse 2s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const API_BASE="https://nyc-transit-backend.vercel.app";

const LINE_COLORS={
  "1":"#EE352E","2":"#EE352E","3":"#EE352E","4":"#00933C","5":"#00933C","6":"#00933C","7":"#B933AD",
  "A":"#2850AD","C":"#2850AD","E":"#2850AD","B":"#FF6319","D":"#FF6319","F":"#FF6319","M":"#FF6319",
  "G":"#6CBE45","J":"#996633","Z":"#996633","L":"#A7A9AC",
  "N":"#FCCC0A","Q":"#FCCC0A","R":"#FCCC0A","W":"#FCCC0A","BUS":"#0039A6","SI":"#0039A6"
};

// ── Data helpers ──────────────────────────────────────────────────────────────

function haversineMiles(a,b,c,d){
  const R=3958.8,dL=((c-a)*Math.PI)/180,dO=((d-b)*Math.PI)/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

async function geocodeAddress(query){
  const q=encodeURIComponent(query.includes("New York")||query.includes("NYC")?query:query+", New York City");
  const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=5&countrycodes=us`,
    {headers:{"Accept-Language":"en","User-Agent":"NYCTransitApp/1.0"}});
  if(!r.ok)throw new Error("Geocoding failed");
  const data=await r.json();
  return data.map(x=>({
    address:x.display_name.replace(/, United States$/,"").replace(/, USA$/,""),
    lat:parseFloat(x.lat),lng:parseFloat(x.lon)
  }));
}

async function fetchStationsNear(lat,lng,miles=0.4){
  const r=await fetch(`${API_BASE}/api/stations?lat=${lat}&lng=${lng}&radiusMiles=${miles}`);
  return r.ok?(await r.json()).stations||[]:[];
}

async function fetchBusStopsNear(lat,lng,miles=0.25){
  const r=await fetch(`${API_BASE}/api/bus-stops?lat=${lat}&lng=${lng}&radiusMiles=${miles}`);
  return r.ok?(await r.json()).stops||[]:[];
}

function getUserLocation(){
  return new Promise((res,rej)=>{
    if(!navigator.geolocation){rej(new Error("unsupported"));return;}
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:p.coords.latitude,lng:p.coords.longitude}),
      e=>rej(e),{enableHighAccuracy:true,timeout:8000}
    );
  });
}

async function fetchAllArrivals(){
  const groups=["ace","bdfm","g","jz","nqrw","l","123456s","7"];
  const results=await Promise.allSettled(groups.map(g=>
    fetch(`${API_BASE}/api/subway?group=${g}`).then(r=>r.json())
  ));
  const merged=[];
  results.forEach(r=>{if(r.status==="fulfilled")merged.push(...(r.value.arrivals||[]));});
  return merged;
}

async function fetchAlerts(){
  const r=await fetch(`${API_BASE}/api/alerts`);
  return r.ok?(await r.json()).alerts||[]:[];
}

async function fetchBusArrivals(stopId){
  const r=await fetch(`${API_BASE}/api/bus?stopId=${stopId}`);
  return r.ok?(await r.json()).arrivals||[]:[];
}

async function getAIRoute(payload){
  const r=await fetch(`${API_BASE}/api/ai-route`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });
  if(!r.ok){const e=await r.json();throw new Error(e.detail||e.error||"AI route failed");}
  return r.json();
}

// ── Components ────────────────────────────────────────────────────────────────

function Bullet({line,size=24}){
  const bg=LINE_COLORS[line]||"#555";
  return(
    <div style={{width:size,height:size,borderRadius:line==="BUS"?5:"50%",background:bg,
      color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",
      fontWeight:700,fontSize:size*0.48,fontFamily:"Helvetica Neue,Arial,sans-serif",flexShrink:0}}>
      {line==="BUS"?"B":line}
    </div>
  );
}

function StepRow({step,isLast}){
  const isTransit=step.type==="transit";
  const isWalk=step.type==="walk";
  return(
    <div style={{display:"flex",gap:12,alignItems:"flex-start",paddingBottom:isLast?0:12}}>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:28,flexShrink:0}}>
        <div style={{width:28,height:28,borderRadius:"50%",
          background:isTransit?"transparent":"#1c1c1f",
          border:isTransit?"none":"1px solid #35353a",
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>
          {isTransit?<Bullet line={step.line} size={28}/>:(isWalk?"🚶":"📍")}
        </div>
        {!isLast&&<div style={{width:2,flex:1,minHeight:16,background:"#232326",marginTop:4}}/>}
      </div>
      <div style={{flex:1,paddingTop:4}}>
        <div style={{fontSize:14,color:"#F2F1ED",fontWeight:500}}>{step.description}</div>
        {isTransit&&(
          <div style={{fontSize:12,color:"#73737a",marginTop:3}}>
            {step.waitMinutes>0&&`Wait ~${step.waitMinutes} min · `}Ride ~{step.rideMinutes} min
          </div>
        )}
        {isWalk&&step.minutes&&(
          <div style={{fontSize:12,color:"#73737a",marginTop:3}}>~{step.minutes} min walk</div>
        )}
      </div>
      <div style={{fontSize:13,fontWeight:600,color:"#73737a",paddingTop:4,flexShrink:0}}>
        {isTransit?(step.waitMinutes||0)+(step.rideMinutes||0):step.minutes||""}
        {" "}<span style={{fontSize:10,fontWeight:400}}>min</span>
      </div>
    </div>
  );
}

function AIRouteCard({route,dest,onRideShare}){
  const isRideshare=route.useRideshare;
  const accent=isRideshare?"#f97316":"#2563EB";
  const accentBg=isRideshare?"rgba(249,115,22,0.08)":"rgba(37,99,235,0.08)";
  const accentBorder=isRideshare?"rgba(249,115,22,0.3)":"rgba(37,99,235,0.35)";

  return(
    <div style={{border:`1.5px solid ${accentBorder}`,borderRadius:16,background:accentBg,
      padding:"16px 16px 14px",marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{background:accent,borderRadius:8,padding:"4px 8px",fontSize:11,
            fontWeight:700,color:"#fff",letterSpacing:0.5}}>
            {isRideshare?"⚠ TRANSIT DISRUPTED":"✦ AI RECOMMENDS"}
          </div>
          {!isRideshare&&(
            <span style={{fontSize:11,color:accent,fontWeight:600}}>FASTEST ROUTE</span>
          )}
        </div>
        <span style={{fontSize:20,fontWeight:700,fontFamily:"monospace",color:"#F2F1ED"}}>
          {route.totalMinutes}<span style={{fontSize:12,fontWeight:400,color:"#73737a"}}> min</span>
        </span>
      </div>

      <p style={{fontSize:13.5,color:"#d0d0d8",lineHeight:1.6,marginBottom:14}}>
        {route.recommendation}
      </p>

      {isRideshare?(
        <div style={{display:"flex",gap:10}}>
          <a href={`https://m.uber.com/ul/?action=setPickup&pickup=my_location&dropoff[latitude]=${dest.lat}&dropoff[longitude]=${dest.lng}&dropoff[nickname]=${encodeURIComponent(dest.address)}`}
            target="_blank" rel="noopener"
            style={{flex:1,background:"#000",color:"#fff",border:"none",borderRadius:10,
              padding:"11px 0",fontSize:14,fontWeight:600,cursor:"pointer",
              textAlign:"center",textDecoration:"none",display:"block"}}>
            🚗 Uber
          </a>
          <a href={`https://lyft.com/ride?id=lyft&destination[latitude]=${dest.lat}&destination[longitude]=${dest.lng}&destination[address]=${encodeURIComponent(dest.address)}`}
            target="_blank" rel="noopener"
            style={{flex:1,background:"#ff00bf",color:"#fff",border:"none",borderRadius:10,
              padding:"11px 0",fontSize:14,fontWeight:600,cursor:"pointer",
              textAlign:"center",textDecoration:"none",display:"block"}}>
            🚗 Lyft
          </a>
        </div>
      ):(
        <div style={{background:"rgba(0,0,0,0.25)",borderRadius:12,padding:"12px 14px"}}>
          {(route.steps||[]).map((step,i)=>(
            <StepRow key={i} step={step} isLast={i===route.steps.length-1}/>
          ))}
        </div>
      )}

      {route.affectedLines&&route.affectedLines.length>0&&(
        <div style={{marginTop:10,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          <span style={{fontSize:11,color:"#f97316"}}>⚠ Delays:</span>
          {route.affectedLines.map(l=><Bullet key={l} line={l} size={18}/>)}
        </div>
      )}
    </div>
  );
}

function NearbyCard({stop,arrivals=[]}){
  const lines=stop.lines&&stop.lines.length?stop.lines:[...new Set(arrivals.map(a=>a.line))];
  const isBus=stop.isBus||stop.type==="bus";
  return(
    <div style={{border:"1px solid #232326",borderRadius:14,padding:"13px 16px",marginBottom:8,background:"#121214"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
          {lines.length>0?lines.slice(0,6).map((l,i)=><Bullet key={i} line={l} size={22}/>):
            <span style={{fontSize:11,color:"#5a5a5f",textTransform:"uppercase"}}>{isBus?"Bus stop":"Station"}</span>}
        </div>
        <span style={{fontSize:11,color:"#5a5a5f"}}>{stop.distMiles!=null?stop.distMiles.toFixed(2):(stop.dist||"")} mi</span>
      </div>
      <div style={{fontFamily:"Fraunces,serif",fontSize:15,color:"#F2F1ED",marginBottom:arrivals.length?8:0}}>
        {stop.name}
      </div>
      {arrivals.length>0?(
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {arrivals.slice(0,3).map((a,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
              <Bullet line={a.line} size={18}/>
              <span style={{fontSize:12,color:"#b3b3b8",flex:1}}>to {a.dest}</span>
              <span style={{fontSize:13,fontWeight:700,color:a.mins[0]<=2?"#5fae6e":"#F2F1ED",fontFamily:"monospace"}}>
                {a.mins[0]===0?"Now":a.mins[0]+" min"}
              </span>
            </div>
          ))}
        </div>
      ):(
        <div className="pulse" style={{fontSize:12,color:"#5a5a5f"}}>Loading arrivals…</div>
      )}
    </div>
  );
}

function AlertStrip({alerts}){
  if(!alerts||alerts.length===0)return null;
  return(
    <div style={{padding:"8px 18px 0"}}>
      {alerts.slice(0,3).map(a=>(
        <div key={a.id} style={{display:"flex",gap:8,alignItems:"flex-start",background:"#1a1410",
          border:"1px solid #3a2c12",borderRadius:10,padding:"8px 12px",marginBottom:7}}>
          <span style={{color:"#FCCC0A",flexShrink:0,marginTop:1}}>⚠</span>
          <span style={{fontSize:12,color:"#d8c9a3",lineHeight:1.4}}>{a.text}</span>
        </div>
      ))}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────

function App(){
  const [locationStatus,setLocationStatus]=useState("loading");
  const [userLoc,setUserLoc]=useState(null);
  const [nearbyStations,setNearbyStations]=useState([]);
  const [nearbyBus,setNearbyBus]=useState([]);
  const [allArrivals,setAllArrivals]=useState([]);
  const [stationArrivals,setStationArrivals]=useState({});
  const [alerts,setAlerts]=useState([]);
  const [usingLive,setUsingLive]=useState(false);
  const [query,setQuery]=useState("");
  const [geocodeResults,setGeocodeResults]=useState([]);
  const [geocoding,setGeocoding]=useState(false);
  const [destination,setDestination]=useState(null);
  const [planState,setPlanState]=useState("idle"); // idle | loading | done | error
  const [aiRoute,setAiRoute]=useState(null);
  const [aiError,setAiError]=useState(null);
  const [showAlerts,setShowAlerts]=useState(false);
  const searchRef=useRef(null);
  const geocodeTimer=useRef(null);

  // Get user location on mount
  useEffect(()=>{
    let cancelled=false;
    getUserLocation()
      .then(loc=>{if(!cancelled){setUserLoc(loc);setLocationStatus("granted");}})
      .catch(e=>{if(!cancelled)setLocationStatus(e.code===1?"denied":"error");});
    return()=>{cancelled=true;};
  },[]);

  // Load nearby stations/bus when location known
  useEffect(()=>{
    if(!userLoc)return;
    let cancelled=false;
    Promise.all([fetchStationsNear(userLoc.lat,userLoc.lng),fetchBusStopsNear(userLoc.lat,userLoc.lng)])
      .then(([st,bs])=>{
        if(!cancelled){
          setNearbyStations(st.map(s=>({...s,type:"subway"})));
          setNearbyBus(bs.map(s=>({...s,type:"bus",isBus:true})));
        }
      }).catch(()=>{});
    return()=>{cancelled=true;};
  },[userLoc]);

  // Load live arrivals + alerts, refresh every 30s
  useEffect(()=>{
    if(nearbyStations.length===0&&nearbyBus.length===0)return;
    let cancelled=false;

    async function load(){
      try{
        const [arr,al]=await Promise.all([fetchAllArrivals(),fetchAlerts()]);
        if(cancelled)return;
        setAllArrivals(arr);
        setAlerts(al);

        const result={};
        nearbyStations.forEach(s=>{
          const matches=arr.filter(a=>a.stopId&&a.stopId.startsWith(s.id))
            .sort((a,b)=>a.arrivalUnix-b.arrivalUnix).slice(0,3);
          result[s.id]=matches.map(a=>({
            line:a.line,dest:"—",
            mins:[Math.max(0,Math.round((a.arrivalUnix*1000-Date.now())/60000))]
          }));
        });

        await Promise.all(nearbyBus.map(async stop=>{
          try{
            const ba=await fetchBusArrivals(stop.id);
            result[stop.id]=ba.slice(0,3).map(a=>({
              line:a.line||"BUS",dest:a.destination||"—",
              mins:a.expectedArrival?[Math.max(0,Math.round((new Date(a.expectedArrival)-Date.now())/60000))]:[]
            }));
          }catch{result[stop.id]=[];}
        }));

        if(!cancelled){setStationArrivals(result);setUsingLive(true);}
      }catch(e){console.warn("Live data unavailable:",e.message);}
    }

    load();
    const iv=setInterval(load,30000);
    return()=>{cancelled=true;clearInterval(iv);};
  },[nearbyStations,nearbyBus]);

  // Debounced geocode as user types
  useEffect(()=>{
    clearTimeout(geocodeTimer.current);
    if(query.trim().length<3){setGeocodeResults([]);return;}
    geocodeTimer.current=setTimeout(async()=>{
      setGeocoding(true);
      try{const r=await geocodeAddress(query);setGeocodeResults(r.slice(0,5));}
      catch{setGeocodeResults([]);}
      finally{setGeocoding(false);}
    },500);
  },[query]);

  // Plan route when destination selected
  const planRoute=useCallback(async(dest)=>{
    setDestination(dest);
    setQuery(dest.address.split(",").slice(0,2).join(","));
    setGeocodeResults([]);
    setPlanState("loading");
    setAiRoute(null);
    setAiError(null);

    try{
      const [originSt,destSt]=await Promise.all([
        fetchStationsNear(userLoc.lat,userLoc.lng,0.5),
        fetchStationsNear(dest.lat,dest.lng,0.5)
      ]);

      // Build arrivals summary for AI
      const arrivalSummary={};
      originSt.slice(0,5).forEach(s=>{
        const matches=allArrivals.filter(a=>a.stopId&&a.stopId.startsWith(s.id))
          .sort((a,b)=>a.arrivalUnix-b.arrivalUnix).slice(0,3);
        if(matches.length>0){
          arrivalSummary[s.name]=matches.map(a=>({
            line:a.line,
            minsAway:Math.max(0,Math.round((a.arrivalUnix*1000-Date.now())/60000))
          }));
        }
      });

      const enrichedOriginSt=originSt.slice(0,6).map(s=>({
        id:s.id,name:s.name,
        distMiles:haversineMiles(userLoc.lat,userLoc.lng,s.lat,s.lng),
        nextArrivals:arrivalSummary[s.name]||[]
      }));

      const enrichedDestSt=destSt.slice(0,6).map(s=>({
        id:s.id,name:s.name,
        distMiles:haversineMiles(dest.lat,dest.lng,s.lat,s.lng)
      }));

      const alertTexts=alerts.slice(0,8).map(a=>({lines:a.lines,text:a.text}));

      const route=await getAIRoute({
        originAddress:locationStatus==="granted"?"Your current location":"Unknown location",
        destAddress:dest.address,
        originLat:userLoc.lat,originLng:userLoc.lng,
        destLat:dest.lat,destLng:dest.lng,
        originStations:enrichedOriginSt,
        destStations:enrichedDestSt,
        arrivals:arrivalSummary,
        alerts:alertTexts
      });

      setAiRoute(route);
      setPlanState("done");
    }catch(e){
      setAiError(e.message);
      setPlanState("error");
    }
  },[userLoc,allArrivals,alerts,locationStatus]);

  const clearDestination=()=>{
    setDestination(null);
    setQuery("");
    setAiRoute(null);
    setPlanState("idle");
    setAiError(null);
    setGeocodeResults([]);
  };

  const allNearby=[...nearbyStations,...nearbyBus].sort((a,b)=>(a.distMiles||0)-(b.distMiles||0));

  return(
    <div style={{fontFamily:"Inter,sans-serif",background:"#0a0a0b",minHeight:"100vh",
      color:"#F2F1ED",maxWidth:480,margin:"0 auto",paddingBottom:80}}>

      {/* Header */}
      <div style={{padding:"20px 18px 14px",borderBottom:"1px solid #1c1c1f",
        position:"sticky",top:0,background:"#0a0a0b",zIndex:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div>
            <div style={{fontSize:10,letterSpacing:2,color:"#FCCC0A",textTransform:"uppercase",marginBottom:3}}>
              NYC Transit
            </div>
            <h1 style={{fontFamily:"Fraunces,serif",fontSize:22,margin:0}}>
              {destination?"Your route":"Where to?"}
            </h1>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>setShowAlerts(v=>!v)}
              style={{background:showAlerts?"#FCCC0A":"#1c1c1f",border:"none",borderRadius:8,
                padding:"6px 10px",fontSize:12,color:showAlerts?"#0a0a0b":"#73737a",cursor:"pointer",fontWeight:600}}>
              {alerts.length>0?`⚠ ${alerts.length}`:"Alerts"}
            </button>
            <div style={{fontSize:11,color:"#5a5a5f"}}>
              {locationStatus==="loading"?"📍…":locationStatus==="granted"?"📍 Live":"📍 Off"}
            </div>
          </div>
        </div>

        {/* Search bar */}
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:12,top:11,fontSize:15,color:"#5a5a5f",zIndex:1}}>
            {geocoding?"⏳":"🔍"}
          </span>
          <input
            ref={searchRef}
            value={query}
            onChange={e=>{setQuery(e.target.value);if(destination)clearDestination();}}
            onKeyDown={e=>{if(e.key==="Escape")clearDestination();}}
            placeholder="Search any address or station in NYC…"
            style={{width:"100%",background:"#16161a",border:"1px solid #232326",borderRadius:12,
              padding:"11px 36px 11px 36px",color:"#F2F1ED",fontSize:14,outline:"none"}}
          />
          {(query||destination)&&(
            <button onClick={clearDestination}
              style={{position:"absolute",right:10,top:9,background:"none",border:"none",
                color:"#5a5a5f",fontSize:18,cursor:"pointer",lineHeight:1}}>×</button>
          )}
        </div>

        {/* Geocode dropdown */}
        {geocodeResults.length>0&&!destination&&(
          <div style={{position:"absolute",left:18,right:18,top:"100%",marginTop:-2,
            background:"#18181b",border:"1px solid #2a2a2d",borderRadius:12,
            overflow:"hidden",zIndex:100,boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>
            {geocodeResults.map((r,i)=>(
              <button key={i} onClick={()=>planRoute(r)}
                style={{width:"100%",background:"none",border:"none",padding:"12px 14px",
                  textAlign:"left",cursor:"pointer",color:"#F2F1ED",fontSize:13,
                  borderBottom:i<geocodeResults.length-1?"1px solid #232326":"none",
                  display:"flex",alignItems:"flex-start",gap:10}}>
                <span style={{color:"#5a5a5f",flexShrink:0,marginTop:1}}>📍</span>
                <span style={{lineHeight:1.4,color:"#d0d0d8"}}>
                  {r.address.split(",").slice(0,3).join(",")}
                </span>
              </button>
            ))}
          </div>
        )}
      </div>

      {/* Alerts panel */}
      {showAlerts&&<AlertStrip alerts={alerts}/>}

      {/* Live indicator */}
      {usingLive&&!showAlerts&&(
        <div style={{padding:"8px 18px 0",display:"flex",alignItems:"center",gap:6,fontSize:11,color:"#5fae6e"}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:"#5fae6e",display:"inline-block"}}/>
          Live MTA data · refreshes every 30s
        </div>
      )}

      <div style={{padding:"12px 18px 0"}}>

        {/* Location denied notice */}
        {locationStatus==="denied"&&(
          <div style={{background:"#1a1410",border:"1px solid #3a2c12",borderRadius:12,
            padding:"12px 14px",marginBottom:12,fontSize:13,color:"#d8c9a3",lineHeight:1.5}}>
            📍 Location is off — turn it on for nearby arrivals, or search any NYC address above.
          </div>
        )}

        {/* ── ROUTE PLANNING STATE ── */}
        {planState==="loading"&&(
          <div style={{textAlign:"center",padding:"40px 20px"}}>
            <div style={{fontSize:32,marginBottom:12}} className="spin">✦</div>
            <div style={{fontFamily:"Fraunces,serif",fontSize:20,marginBottom:6}}>Planning your route…</div>
            <div style={{fontSize:13,color:"#73737a"}}>Checking live arrivals and service alerts</div>
          </div>
        )}

        {planState==="error"&&(
          <div style={{background:"rgba(238,53,46,0.08)",border:"1px solid rgba(238,53,46,0.3)",
            borderRadius:14,padding:"14px 16px",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:600,color:"#ee352e",marginBottom:4}}>Couldn't plan route</div>
            <div style={{fontSize:13,color:"#d0d0d8",lineHeight:1.5,marginBottom:10}}>{aiError}</div>
            <div style={{fontSize:12,color:"#73737a"}}>
              If this keeps happening, make sure ANTHROPIC_API_KEY is set in your Vercel environment variables.
            </div>
          </div>
        )}

        {planState==="done"&&aiRoute&&(
          <>
            <div style={{fontSize:12,color:"#5a5a5f",marginBottom:8}}>
              To: <span style={{color:"#b3b3b8"}}>{destination?.address.split(",").slice(0,2).join(",")}</span>
            </div>
            <AIRouteCard route={aiRoute} dest={destination}/>
            <div style={{fontSize:12,color:"#5a5a5f",margin:"14px 0 8px",fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>
              Nearby departures
            </div>
          </>
        )}

        {/* ── NEARBY ARRIVALS (always shown) ── */}
        {planState==="idle"&&nearbyStations.length===0&&nearbyBus.length===0&&locationStatus==="granted"&&(
          <div style={{fontSize:13,color:"#5a5a5f",marginTop:8,lineHeight:1.6}}>
            Finding what's near you… or search any NYC address above to plan a trip.
          </div>
        )}

        {planState!=="loading"&&(
          <>
            {planState==="idle"&&allNearby.length>0&&(
              <div style={{fontSize:12,color:"#5a5a5f",marginBottom:8,fontWeight:600,
                textTransform:"uppercase",letterSpacing:0.5}}>
                Nearby right now
              </div>
            )}
            {allNearby.map(s=>(
              <NearbyCard key={s.id} stop={s} arrivals={stationArrivals[s.id]||[]}/>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
